<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox VM Provisioner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="Logo.png" alt="Company Logo">
            <span>LuminHosts</span>
        </div>
    </nav>

    <main class="hero-section">
        <div class="form-container">
            <h2>Deploy A New Server</h2>
            <p>What VM Config do you want?</p>
            
            <form id="vm-form">
               <div class="input-group">
                    <label for="gameType">Game</label>
                    <select id="gameType">
                        <option value="defaultOption">Select a Game</option>
                        <option value="mincraft">Mincraft</option>
                        <option value="hytale">Hytale</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="ramAmount">Ram</label>
                    <select id="ramAmount">
                        <option value="4gb">4GB</option>
                        <option value="6gb">6B</option>
                        <option value="8gb">8GB</option>
                        <option value="16gb">16GB</option>
                        <option value="32gb">32GB</option>
                    </select>
                </div>

                 <div class="input-group">
                    <label for="CoreAmount">Cores</label>
                    <select id="ramAmount">
                        <option value="4 Cores">4 Cores(Default)</option>
                        <option value="8 Cores">8 Corest(Premium)</option>
                    </select>
                </div

                <button type="submit" class="btn-primary">Provision VM</button>
            </form>
        </div>
    </main>

</body>
</html>
