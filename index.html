<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox VM Provisioner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="YOUR_LOGO_HERE.png" alt="Company Logo">
            <span>BRAND_NAME</span>
        </div>
    </nav>

    <main class="hero-section">
        <div class="form-container">
            <h2>Deploy New Instance</h2>
            <p>Configure your VM parameters below.</p>
            
            <form id="vm-form">
                <div class="input-group">
                    <label for="vm-name">VM Name</label>
                    <input type="text" id="vm-name" placeholder="e.g. web-server-01" required>
                </div>

                <div class="input-group">
                    <label for="os-template">OS Template</label>
                    <select id="os-template">
                        <option value="ubuntu-22.04">Ubuntu 22.04</option>
                        <option value="debian-12">Debian 12</option>
                        <option value="centos-9">CentOS Stream 9</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="cpu-cores">CPU Cores</label>
                        <input type="number" id="cpu-cores" value="2" min="1">
                    </div>
                    <div class="input-group">
                        <label for="ram-gb">RAM (GB)</label>
                        <input type="number" id="ram-gb" value="4" min="1">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Provision VM</button>
            </form>
        </div>
    </main>

</body>
</html>
